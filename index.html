<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hitster Bingo Wheel</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>&#127919;</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">
        <span class="title-hit">HITSTER</span>
        <span class="title-music">Music</span>
        <span class="title-bingo">BINGO</span>
      </h1>
      <p class="subtitle">Kategorie-Rad</p>
    </header>

    <div class="mode-selector" role="radiogroup" aria-label="Spielmodus">
      <button class="mode-btn active" data-mode="anfaenger" role="radio" aria-checked="true" type="button">Anf&#228;nger</button>
      <button class="mode-btn" data-mode="profi" role="radio" aria-checked="false" type="button">Profi</button>
    </div>

    <div id="result" class="result" aria-live="polite">
      <span class="result-idle">Dr&#252;cke Spin!</span>
    </div>

    <div class="wheel-area">
      <div class="wheel-container">
        <div class="pointer" aria-hidden="true"></div>
        <svg id="wheel-svg" viewBox="0 0 400 400" class="wheel-svg" role="img" aria-label="Gl&#252;cksrad"></svg>
      </div>
    </div>

    <button id="spin-btn" class="spin-btn" type="button" aria-label="Rad drehen">Spin!</button>

    <div id="legend" class="legend" role="list" aria-label="Kategorien"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/wheel.js"></script>
  <script src="js/spin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
